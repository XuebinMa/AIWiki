# Vale 配置：散文风格闸门
# 只做「套话 / AI 腔」这一类与语言无关的字面检查（自定义 AIWiki 样式），
# 不启用英文语法/可读性规则，避免对中文条目误报。中英混排空格交给 autocorrect，
# 拼写交给 cspell，中文行文交给 zhlint。
StylesPath = styles
MinAlertLevel = warning

# 把 .mdx 当作 Markdown 解析，避免 Vale 调用外部 mdx2vast（CI 里没有、会 E100 报错）。
# 我们的 import / <PitfallMeta> 行对 Markdown 解析器无害，AIWiki 样式只做字面套话匹配。
[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = AIWiki

# 元文档（本身在讲写作规范、会引用套话作反例）不参与套话检查，否则会误报自己。
[{README,CONTRIBUTING,STYLE-GUIDE,CLAUDE,CREDITS,terminology,BACKLOG,BACKLOG-privacy,PROPOSAL-privacy-book,DOGFOODING}.md]
AIWiki.Cliches = NO
