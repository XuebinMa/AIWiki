name: Lint Docs

# 散文质量闸门：给「写作」也建一个「信任但要验证」的闭环。
on:
  pull_request:
    paths:
      - 'docs/**'
      - 'i18n/**'
      - '**/*.md'
      - '**/*.mdx'
      - '.vale.ini'
      - 'styles/**'
      - '.cspell.json'
      - 'sidebars.js'
      - 'docusaurus.config.js'
      - 'scripts/**'
      - 'package.json'
  push:
    branches: [main]

jobs:
  prose:
    name: 散文质量
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: autocorrect（中英文混排空格 / 标点）
        uses: huacnlee/autocorrect-action@main

      - name: Vale（套话 / AI 腔）
        uses: errata-ai/vale-action@reviewdog
        with:
          version: latest
          fail_on_error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 cspell
        run: npm install -g cspell@8

      - name: cspell（拼写）
        run: cspell --no-progress "docs/**/*.{md,mdx}" "i18n/**/*.{md,mdx}"

      - name: 配置 Node（i18n 检查需要 docusaurus）
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: i18n（侧边栏分类翻译完整性，防回退成中文）
        run: npm run check:i18n

      - name: 中英镜像完整性（每条 docs 都要有 i18n/en 对应）
        run: npm run check:mirror

      - name: 构建（两 locale；连带校验 MDX / import / 死内链）
        run: npm run build
