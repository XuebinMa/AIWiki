name: Lint Docs

# 散文质量闸门：给「写作」也建一个「信任但要验证」的闭环。
# 不做 paths 过滤：全量跑也就 3–4 分钟，且「散文质量」将设为 required check——
# 带过滤时只动过滤外文件的 PR 检查不触发、required 状态永远 pending、PR 无法合并。
on:
  pull_request:
  push:
    branches: [main]

# 供应链纪律：token 一律只读；第三方 action 只引用不可变版本（活分支引用是 2026-07 评审点名的风险）。
permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prose:
    name: 散文质量
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: autocorrect（中英文混排空格 / 标点）
        uses: huacnlee/autocorrect-action@v2.13.3

      - name: Vale（套话 / AI 腔）
        uses: errata-ai/vale-action@2.1.2
        with:
          version: 3.9.1 # 钉住 vale 版本防规则漂移；升级手动改（Cliches.yml 只用 existence，跨版本稳定）
          fail_on_error: true
          filter_mode: nofilter # PR 也全量扫，与本地 `vale docs i18n privacy` 等价（默认 added 只扫改动行）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: cspell（拼写；devDependencies 锁定版本，别再全局浮动装）
        run: npx cspell --no-progress "docs/**/*.{md,mdx}" "privacy/**/*.{md,mdx}" "i18n/**/*.{md,mdx}"

      - name: i18n（侧边栏分类翻译完整性，防回退成中文）
        run: npm run check:i18n

      - name: 中英镜像完整性（每条 docs 都要有 i18n/en 对应）
        run: npm run check:mirror

      - name: 镜像结构对等（标题 / admonition / 内链目标集 / slug，防中改英不改）
        run: npm run check:mirror-deep

      - name: 手写计数一致性（core-20 / CLAUDE.md 现状 vs 实际条目数）
        run: npm run check:counts

      - name: 构建（两 locale；连带校验 MDX / import / 死内链）
        run: npm run build
